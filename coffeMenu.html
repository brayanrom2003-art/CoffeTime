<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú | Coffe Time</title>
    <link rel="stylesheet" href="estilosMenu.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="nav-content">
            <a href="principal.html" class="btn-regresar">← Volver</a>
            <div class="logo">COFFE<span>TIME</span></div>
            <div class="carrito-status">
                <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" width="20">
                <span id="cuenta-carrito">0</span>
            </div>
        </div>
    </header>

    <main class="menu-container">
        <h1 class="titulo-pagina">Disfrútalos!</h1>
        <h2 class="subtitulo-pagina">Conoce nuestras bebidas y alimentos de temporada</h2>
        <hr class="separador">
        
        <p class="categoria-label">Bebidas</p>

        <div class="menu-grid">
            <div class="item-menu">
                <div class="circulo-img">
                    <img src="https://cantinasalonflorida.com/wp-content/uploads/2019/12/191211_las-cinco-bebidas-mas-calientes-y-sabrosas-para-espantar-el-frio__Cantina-Salon-Florida.jpg" alt="Caliente">
                </div>
                <h3>Bebidas calientes</h3>
                <div class="botones-grupo">
                    <button class="btn-detalle" onclick="mostrarDetalle('Latte Especial', 'Granos de altura, leche cremosa y esencia de vainilla.', 'Acompáñalo con un pan artesanal.')">Detalles</button>
                    <button class="btn-add" onclick="sumar()">$65.00 - Agregar</button>
                </div>
            </div>

            <div class="item-menu">
                <div class="circulo-img">
                    <img src="https://images.unsplash.com/photo-1572442388796-11668a67e53d?q=80&w=400" alt="Frappe">
                </div>
                <h3>Frappuccino®</h3>
                <div class="botones-grupo">
                    <button class="btn-detalle" onclick="mostrarDetalle('Frappé Moka', 'Base de café, chocolate suizo, hielo y crema batida.', 'Ideal para una tarde calurosa.')">Detalles</button>
                    <button class="btn-add" onclick="sumar()">$85.00 - Agregar</button>
                </div>
            </div>

            <div class="item-menu">
                <div class="circulo-img">
                  <img src="https://razaitaliana.com/wp-content/uploads/2023/03/Cafe-Frio.jpg" alt="Café Frío">
                </div>
                <h3>Bebidas Frías</h3>
                <div class="botones-grupo">
                    <button class="btn-detalle" onclick="mostrarDetalle('Shaken Espresso', 'Espresso agitado con hielo y un toque de azúcar morena.', 'Pídelo con leche de avena.')">Detalles</button>
                    <button class="btn-add" onclick="sumar()">$70.00 - Agregar</button>
                </div>
            </div>
        </div>
    </main>

    <div id="modalInfo" class="modal">
        <div class="modal-content">
            <span class="cerrar" onclick="cerrar()">&times;</span>
            <h2 id="m-titulo"></h2>
            <p><strong>Ingredientes:</strong> <span id="m-ingredientes"></span></p>
            <p><strong>Recomendación:</strong> <span id="m-rec"></span></p>
        </div>
    </div>

    <section class="seccion-pago">
        <div class="pago-container">
            <h2>Completa tu pedido</h2>
            <form id="form-pago" onsubmit="pagoFinal(event)">
                <input type="text" id="cliente" placeholder="Nombre completo" required>
                <input type="text" id="direccion" placeholder="Dirección de envío" required>
                <div class="input-flex">
                    <input type="tel" id="telefono" placeholder="Teléfono" required>
                    <select id="metodo-pago">
                        <option value="Pago con tarjeta">Pago con tarjeta</option>
                        <option value="Efectivo contra entrega">Efectivo contra entrega</option>
                    </select>
                </div>
                <button type="submit" class="btn-final">Confirmar Orden</button>
            </form>
        </div>
    </section>

    <script>
        let c = 0;
        function sumar() { 
            c++; 
            document.getElementById('cuenta-carrito').innerText = c; 
        }

        function mostrarDetalle(t, i, r) {
            document.getElementById('m-titulo').innerText = t;
            document.getElementById('m-ingredientes').innerText = i;
            document.getElementById('m-rec').innerText = r;
            document.getElementById('modalInfo').style.display = "block";
        }

        function cerrar() { 
            document.getElementById('modalInfo').style.display = "none"; 
        }

        function pagoFinal(e) { 
            e.preventDefault(); 
            
            // 1. Obtener valores de los inputs
            const cliente = document.getElementById('cliente').value;
            const direccion = document.getElementById('direccion').value;
            const telefono = document.getElementById('telefono').value;
            const metodo = document.getElementById('metodo-pago').value;
            const cantidad = c;

            // Validar que el carrito no esté vacío
            if (cantidad === 0) {
                alert("Por favor, agrega al menos un café a tu carrito.");
                return;
            }

            // 2. Construir el Ticket para WhatsApp
            // %0A es para saltos de línea
            let mensaje = "☕ *TICKET DE COMPRA - COFFE TIME* ☕%0A";
            mensaje += "------------------------------------------%0A";
            mensaje += "*Cliente:* " + cliente + "%0A";
            mensaje += "*Dirección:* " + direccion + "%0A";
            mensaje += "*Teléfono:* " + telefono + "%0A";
            mensaje += "*Total de productos:* " + cantidad + " bebidas%0A";
            mensaje += "*Método de Pago:* " + metodo + "%0A";
            mensaje += "------------------------------------------%0A";
            mensaje += "¡Gracias por tu compra! En breve procesaremos tu pedido.";

            // 3. Configurar número (Coloca tu número aquí con código de país, ej: 52 para México)
            const miTelefono = "525512345678"; 

            // 4. Abrir WhatsApp
            const urlWhatsApp = "https://api.whatsapp.com/send?phone=" + miTelefono + "&text=" + mensaje;
            
            window.open(urlWhatsApp, '_blank');
            
            alert("¡Gracias! Redirigiendo a WhatsApp para confirmar tu ticket."); 
            window.location.href="principal.html"; 
        }
    </script>

</body>
</html>
